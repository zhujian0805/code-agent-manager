# Code Assistant Manager - Repository Configuration
# This file configures sources for skills, agents, and plugins

repositories:
  # Instruction repositories
  instructions:
    sources:
      # Local user file (highest priority)
      - type: local
        path: ~/.config/code-agent-manager/instruction_repos.json

      # Remote awesome repository configs
      - type: remote
        url: https://raw.githubusercontent.com/Chat2AnyLLM/awesome-repo-configs/main/instruction_repos.json

  # Skill repositories
  skills:
    sources:
      # Local user file (highest priority)
      - type: local
        path: ~/.config/code-agent-manager/skill_repos.json
      
      # Remote awesome repository configs
      - type: remote
        url: https://raw.githubusercontent.com/Chat2AnyLLM/awesome-repo-configs/main/skill_repos.json
  
  # Agent repositories
  agents:
    sources:
      # Local user file (highest priority)
      - type: local
        path: ~/.config/code-agent-manager/agent_repos.json
      
      # Remote awesome repository configs
      - type: remote
        url: https://raw.githubusercontent.com/Chat2AnyLLM/awesome-repo-configs/main/agent_repos.json
  
  # Plugin repositories
  plugins:
    sources:
      # Local user file (highest priority)
      - type: local
        path: ~/.config/code-agent-manager/plugin_repos.json
      
      # Remote awesome repository configs
      - type: remote
        url: https://raw.githubusercontent.com/Chat2AnyLLM/awesome-repo-configs/main/plugin_repos.json

  # Prompt repositories
  prompts:
    sources:
      # Local user file (highest priority)
      - type: local
        path: ~/.config/code-agent-manager/prompt_repos.json

      # Remote awesome prompts catalog config
      - type: remote
        url: https://raw.githubusercontent.com/Chat2AnyLLM/awesome-prompts/master/config.yaml

  # MCP server catalog
  mcpServers:
    sources:
      # Local user file (highest priority)
      - type: local
        path: ~/.config/code-agent-manager/mcp_servers.json

      # Remote awesome MCP server catalog config
      - type: remote
        url: https://raw.githubusercontent.com/Chat2AnyLLM/awesome-mcp-servers/main/config.yaml

# Cache settings for remote sources
cache:
  enabled: true
  directory: ~/.cache/code-agent-manager/repos
  ttl_seconds: 3600  # Cache remote sources for 1 hour
