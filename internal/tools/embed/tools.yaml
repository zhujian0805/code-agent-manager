tools:
  gemini-cli:
    enabled: true
    install_cmd: npm install -g @google/gemini-cli@latest
    cli_command: gemini
    description: "Google Gemini CLI"
    env:
      required_any:
        - ["GEMINI_API_KEY"]
        - ["GOOGLE_APPLICATION_CREDENTIALS", "GOOGLE_CLOUD_PROJECT", "GOOGLE_CLOUD_LOCATION", "GOOGLE_GENAI_USE_VERTEXAI"]
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    configuration:
      notes:
        - "No code-agent-manager endpoint selection; authentication is driven by environment variables."
    cli_parameters:
      injected: []
    filesystem:
      touched:
        - "~/.gemini/settings.json (security section removed if present before launch)"

  openai-codex:
    enabled: true
    install_cmd: npm install -g @openai/codex@latest
    cli_command: codex
    description: "OpenAI Codex CLI"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    config_target:
      path: ~/.codex/config.toml
      format: toml
      upsert:
        model_providers.{endpoint_name}.name: "{endpoint_name}"
        model_providers.{endpoint_name}.base_url: "{endpoint}"
        model_providers.{endpoint_name}.env_key: "OPENAI_API_KEY"
        profiles.{selected_model}.model: "{selected_model}"
        profiles.{selected_model}.model_provider: "{endpoint_name}"
        profiles.{selected_model}.model_reasoning_effort: "low"
    configuration:
      required:
        endpoint: "Base URL for OpenAI-compatible API."
        list_models_cmd: "Shell command returning available models for the endpoint."
      optional:
        api_key_env: "Environment variable name containing the API key."
        supported_client: "Comma-separated list used to filter endpoints; must include codex."
        keep_proxy_config: "When true, preserve proxy variables during model discovery."
        use_proxy: "When true, apply proxies from common config to runtime requests."
        description: "Display label shown during endpoint selection."
      model_listing_env:
        endpoint: "Provided to list_models_cmd as env var endpoint."
        api_key: "Provided to list_models_cmd as env var api_key (resolved API key)."
        proxies: "Proxy variables removed unless keep_proxy_config is true."
    cli_parameters:
      injected:
        - "-c model_providers.custom.name=custom"
        - "-c model_providers.custom.base_url={BASE_URL}"
        - "-c profiles.custom.model={selected_model}"
        - "-c profiles.custom.model_provider=custom"
        - "-c profiles.custom.model_reasoning_effort=low"
        - "-c model_providers.custom.env_key=OPENAI_API_KEY"
        - "-p custom"

  qwen-code:
    enabled: true
    install_cmd: npm install -g @qwen-code/qwen-code@latest
    cli_command: qwen
    description: "Qwen Code CLI"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    config_target:
      path: ~/.qwen/settings.json
      format: json
      upsert:
        env.OPENAI_BASE_URL: "{endpoint}"
        env.OPENAI_API_KEY: "{api_key}"
        env.OPENAI_MODEL: "{selected_model}"
    configuration:
      required:
        endpoint: "Base URL for OpenAI-compatible API."
        list_models_cmd: "Shell command returning available models for the endpoint."
      optional:
        api_key_env: "Environment variable name containing the API key."
        supported_client: "Comma-separated list used to filter endpoints; must include qwen."
        keep_proxy_config: "When true, preserve proxy variables during model discovery."
        use_proxy: "When true, apply proxies from common config to runtime requests."
        description: "Display label shown during endpoint selection."
      model_listing_env:
        endpoint: "Provided to list_models_cmd as env var endpoint."
        api_key: "Provided to list_models_cmd as env var api_key (resolved API key)."
        proxies: "Proxy variables removed unless keep_proxy_config is true."
    cli_parameters:
      injected: []

  claude-code:
    enabled: true
    install_cmd: curl -fsSL https://claude.ai/install.sh | bash
    cli_command: claude
    description: "Claude Code CLI"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    config_target:
      path: ~/.claude/settings.json
      format: json
      upsert:
        env.ANTHROPIC_BASE_URL: "{endpoint}"
        env.ANTHROPIC_AUTH_TOKEN: "{api_key}"
        env.CLAUDE_CODE_OAUTH_TOKEN: "{api_key}"
        env.ANTHROPIC_MODEL: "{selected_model}"
        env.ANTHROPIC_SMALL_FAST_MODEL: "{model_2}"
        env.ANTHROPIC_DEFAULT_SONNET_MODEL: "{selected_model}"
        env.ANTHROPIC_DEFAULT_HAIKU_MODEL: "{selected_model}"
        env.DISABLE_NON_ESSENTIAL_MODEL_CALLS: "1"
        env.CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    configuration:
      required:
        endpoint: "Base URL for the Anthropic-compatible API."
        list_models_cmd: "Shell command returning available models for the endpoint."
      optional:
        api_key_env: "Environment variable name containing the API key."
        supported_client: "Comma-separated list used to filter endpoints; must include claude."
        keep_proxy_config: "When true, preserve proxy variables during model discovery."
        use_proxy: "When true, apply proxies from common config to runtime requests."
        description: "Display label shown during endpoint selection."
      model_listing_env:
        endpoint: "Provided to list_models_cmd as env var endpoint."
        api_key: "Provided to list_models_cmd as env var api_key (resolved API key)."
        proxies: "Proxy variables removed unless keep_proxy_config is true."
  ampcode:
    enabled: true
    install_cmd: curl -fsSL https://ampcode.com/install.sh | bash
    cli_command: amp
    description: "Amp CLI - frontier coding agent"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    configuration:
      notes:
        - "Amp CLI provides three modes: smart (unconstrained models), rush (fast/cheap), free (ad-supported)"
        - "Configuration stored in ~/.config/amp/settings.json"
        - "Supports MCP servers and various LLM providers"
    cli_parameters:
      injected: []
    filesystem:
      touched:
        - "~/.config/amp/settings.json (Amp CLI configuration)"

  copilot-api:
    enabled: true
    install_cmd: npm install -g @github/copilot
    cli_command: copilot
    description: "GitHub Copilot CLI"
    env:
      required:
        GITHUB_TOKEN: "Must be set for GitHub Copilot authentication."
      optional:
        NODE_EXTRA_CA_CERTS: "Forwarded when file exists to extend trusted CAs."
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    configuration:
      notes:
        - "No endpoint selection; runs the installed GitHub Copilot CLI directly."
    cli_parameters:
      injected:
        - "--banner"

  codebuddy:
    enabled: true
    install_cmd: npm install -g "@tencent-ai/codebuddy-code@latest"
    cli_command: codebuddy
    description: "Tencent CodeBuddy CLI"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    config_target:
      path: ~/.codebuddy.json
      format: json
      upsert:
        env.CODEBUDDY_BASE_URL: "{endpoint}"
        env.CODEBUDDY_API_KEY: "{api_key}"
    configuration:
      required:
        endpoint: "Base URL for Tencent CodeBuddy API."
        list_models_cmd: "Shell command returning available models for the endpoint."
      optional:
        api_key_env: "Environment variable name containing the API key."
        supported_client: "Comma-separated list used to filter endpoints; must include codebuddy."
        keep_proxy_config: "When true, preserve proxy variables during model discovery."
        use_proxy: "When true, apply proxies from common config to runtime requests."
        description: "Display label shown during endpoint selection."
      model_listing_env:
        endpoint: "Provided to list_models_cmd as env var endpoint."
        api_key: "Provided to list_models_cmd as env var api_key (resolved API key)."
        proxies: "Proxy variables removed unless keep_proxy_config is true."
    cli_parameters:
      injected:
        - "--model {selected_model}"

  droid:
    enabled: true
    install_cmd: curl -fsSL https://app.factory.ai/cli | sh
    cli_command: droid
    description: "Factory.ai Droid CLI"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
      removed:
        - http_proxy
        - HTTP_PROXY
        - https_proxy
        - HTTPS_PROXY
        - no_proxy
        - NO_PROXY
        - all_proxy
        - ALL_PROXY
    config_target:
      path: ~/.factory/settings.json
      format: json
      upsert:
        customModels[displayName={endpoint_name}/{selected_model}].displayName: "{endpoint_name}/{selected_model}"
        customModels[displayName={endpoint_name}/{selected_model}].model: "{selected_model}"
        customModels[displayName={endpoint_name}/{selected_model}].baseUrl: "{endpoint}"
        customModels[displayName={endpoint_name}/{selected_model}].apiKey: "{api_key}"
        customModels[displayName={endpoint_name}/{selected_model}].provider: "openai"
        customModels[displayName={endpoint_name}/{selected_model}].maxOutputTokens: "8192"
    configuration:
      required:
        endpoint: "Base URL for each supported endpoint (multiple selections allowed)."
        list_models_cmd: "Shell command returning available models for the endpoint."
      optional:
        api_key_env: "Environment variable name containing the API key."
        supported_client: "Comma-separated list used to filter endpoints; must include droid."
        keep_proxy_config: "When true, preserve proxy variables during model discovery."
        use_proxy: "When true, apply proxies from common config to runtime requests."
        description: "Display label shown during endpoint selection."
      model_listing_env:
        endpoint: "Provided to list_models_cmd as env var endpoint."
        api_key: "Provided to list_models_cmd as env var api_key (resolved API key)."
        proxies: "Proxy variables removed unless keep_proxy_config is true."
    cli_parameters:
      injected: []
    filesystem:
      generated:
        - "~/.factory/settings.json containing customModels entries with displayName, model, baseUrl, apiKey, provider, and maxOutputTokens"

  iflow:
    enabled: true
    install_cmd: npm i -g @iflow-ai/iflow-cli
    cli_command: iflow
    description: "iFlow CLI"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    config_target:
      path: ~/.iflow/settings.json
      format: json
      upsert:
        env.IFLOW_BASE_URL: "{endpoint}"
        env.IFLOW_API_KEY: "{api_key}"
        env.IFLOW_MODEL_NAME: "{selected_model}"
    configuration:
      required:
        endpoint: "Base URL for iFlow-compatible API."
        list_models_cmd: "Shell command returning available models for the endpoint."
      optional:
        api_key_env: "Environment variable name containing the API key."
        supported_client: "Comma-separated list used to filter endpoints; must include iflow."
        keep_proxy_config: "When true, preserve proxy variables during model discovery."
        use_proxy: "When true, apply proxies from common config to runtime requests."
        description: "Display label shown during endpoint selection."
      model_listing_env:
        endpoint: "Provided to list_models_cmd as env var endpoint."
        api_key: "Provided to list_models_cmd as env var api_key (resolved API key)."
        proxies: "Proxy variables removed unless keep_proxy_config is true."
    cli_parameters:
      injected: []

  zed:
    enabled: false
    install_cmd: curl -f https://zed.dev/install.sh | sh
    cli_command: zed
    description: "Zed Editor - to be implemented"

  qodercli:
    enabled: false
    install_cmd: npm install -g @qoder-ai/qodercli
    cli_command: qodercli
    description: "Qoder CLI - to be implemented"

  neovate:
    enabled: false
    install_cmd: npm i @neovate/code -g
    cli_command: neovate
    description: "Neovate Code CLI - to be implemented"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    config_target:
      path: ~/.neovate/config.json
      format: json
      upsert:
        providers.{endpoint_name}.baseURL: "{endpoint}"
        providers.{endpoint_name}.apiKey: "{api_key}"
        providers.{endpoint_name}.model: "{selected_model}"
        defaultProvider: "{endpoint_name}"
    configuration:
      required:
        endpoint: "Base URL for Neovate-compatible API."
        list_models_cmd: "Shell command returning available models for the endpoint."
      optional:
        api_key_env: "Environment variable name containing the API key."
        supported_client: "Comma-separated list used to filter endpoints; must include neovate."
        keep_proxy_config: "When true, preserve proxy variables during model discovery."
        use_proxy: "When true, apply proxies from common config to runtime requests."
        description: "Display label shown during endpoint selection."
      model_listing_env:
        endpoint: "Provided to list_models_cmd as env var endpoint."
        api_key: "Provided to list_models_cmd as env var api_key (resolved API key)."
        proxies: "Proxy variables removed unless keep_proxy_config is true."
    cli_parameters:
      injected: []
    filesystem:
      generated:
        - "~/.neovate/config.json containing provider configuration based on selected endpoint"

  crush:
    enabled: true
    install_cmd: npm install -g @charmland/crush
    cli_command: crush
    description: "Charmland Crush CLI"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    configuration:
      notes:
        - "Configures MCP servers from the local registry into crush.json"
    cli_parameters:
      injected: []
    filesystem:
      generated:
        - "~/.config/crush/crush.json containing MCP server configurations"

  cursor-agent:
    enabled: true
    install_cmd: curl https://cursor.com/install -fsS | bash
    cli_command: cursor-agent
    description: "Cursor Agent CLI"
    env:
      required_any:
        - ["CURSOR_API_KEY"]
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    configuration:
      notes:
        - "Cursor Agent requires authentication via CURSOR_API_KEY environment variable"
        - "MCP servers can be configured in ~/.cursor/mcp.json"
    cli_parameters:
      injected: []
    filesystem:
      touched:
        - "~/.cursor/mcp.json (MCP server configurations)"

  opencode:
    enabled: true
    install_cmd: curl -fsSL https://opencode.ai/install | bash
    cli_command: opencode
    description: "OpenCode.ai CLI"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    configuration:
      notes:
        - "OpenCode.ai supports 75+ LLM providers via AI SDK and Models.dev"
        - "API keys are configured via 'opencode /connect' command and stored in ~/.local/share/opencode/auth.json"
        - "Providers and models are configured in opencode.json"
        - "MCP servers can be configured in opencode.json under the 'mcp' section"
    cli_parameters:
      injected: []
    filesystem:
      touched:
        - "~/.local/share/opencode/auth.json (API key storage)"
        - "~/.config/opencode/opencode.json (provider and MCP server configuration)"

  continue:
    enabled: true
    install_cmd: npm i -g @continuedev/cli
    cli_command: cn
    description: "Continue.dev CLI"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    configuration:
      notes:
        - "Continue.dev is an open-source AI coding assistant"
        - "Configuration is stored in ~/.continue/config.yaml"
        - "MCP servers can be configured in config.yaml under 'mcpServers'"
        - "Supports multiple AI providers and models"
    cli_parameters:
      injected: []
    filesystem:
      generated:
        - "~/.continue/config.yaml (Continue configuration file)"

  goose:
    enabled: true
    install_cmd: curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh | CONFIGURE=false bash
    cli_command: goose
    description: "Block Goose - open-source, extensible AI agent"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    configuration:
      notes:
        - "Goose is an open-source AI agent that automates development tasks."
        - "It runs locally and supports multiple LLM providers."
        - "Configuration and extensions via Model Context Protocol (MCP)."
    cli_parameters:
      injected: []

  kimi:
    enabled: true
    install_cmd: npm install -g @jacksontian/kimi-cli@latest
    cli_command: kimi
    description: "Moonshot AI Kimi CLI"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    config_target:
      path: ~/.kimi/config.toml
      format: toml
      upsert:
        provider: "{endpoint_name}"
        providers.{endpoint_name}.base_url: "{endpoint}"
        providers.{endpoint_name}.api_key: "{api_key}"
        providers.{endpoint_name}.model: "{selected_model}"
    configuration:
      required:
        endpoint: "Base URL for Moonshot AI Kimi API."
        list_models_cmd: "Shell command returning available models for the endpoint."
      optional:
        api_key_env: "Environment variable name containing the API key."
        supported_client: "Comma-separated list used to filter endpoints; must include kimi."
        keep_proxy_config: "When true, preserve proxy variables during model discovery."
        use_proxy: "When true, apply proxies from common config to runtime requests."
        description: "Display label shown during endpoint selection."
      model_listing_env:
        endpoint: "Provided to list_models_cmd as env var endpoint."
        api_key: "Provided to list_models_cmd as env var api_key (resolved API key)."
        proxies: "Proxy variables removed unless keep_proxy_config is true."
    cli_parameters:
      injected: []
    filesystem:
      touched:
        - "~/.kimi/config.toml (Kimi CLI configuration file)"

  aichat:
    enabled: true
    install_cmd: cargo install aichat
    cli_command: aichat
    description: "AIChat - AI-powered chat CLI with multiple LLM support"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    config_target:
      path: ~/.config/aichat/config.yaml
      format: yaml
      upsert:
        clients.{endpoint_name}.type: "openai-compatible"
        clients.{endpoint_name}.api_base: "{endpoint}"
        clients.{endpoint_name}.api_key: "{api_key}"
        clients.{endpoint_name}.models[+].name: "{selected_model}"
    configuration:
      required:
        endpoint: "Base URL for OpenAI-compatible API."
        list_models_cmd: "Shell command returning available models for the endpoint."
      optional:
        api_key_env: "Environment variable name containing the API key."
        supported_client: "Comma-separated list used to filter endpoints; must include aichat."
        keep_proxy_config: "When true, preserve proxy variables during model discovery."
        use_proxy: "When true, apply proxies from common config to runtime requests."
        description: "Display label shown during endpoint selection."
      model_listing_env:
        endpoint: "Provided to list_models_cmd as env var endpoint."
        api_key: "Provided to list_models_cmd as env var api_key (resolved API key)."
        proxies: "Proxy variables removed unless keep_proxy_config is true."
    cli_parameters:
      injected: []
    filesystem:
      touched:
        - "~/.config/aichat/config.yaml (AIChat configuration file)"

  pi-coding-agent:
    enabled: true
    install_cmd: npm install -g @mariozechner/pi-coding-agent
    cli_command: pi
    description: "Pi Coding Agent"
    env:
      managed:
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
    configuration:
      required:
        defaultProvider: "LLM provider name (e.g., 'anthropic')"
        defaultModel: "Model ID to use (e.g., 'claude-sonnet-4-20250514')"
      optional:
        defaultThinkingLevel: "Valid values: off, minimal, low, medium, high, xhigh"
        hideThinkingBlock: "Hide thinking blocks from output (boolean)"
        theme: "UI theme (default: dark)"
        quietStartup: "Skip startup messages (boolean)"
        enableSkillCommands: "Enable interactive skill commands (boolean, default: true)"
        steeringMode: "Message delivery mode (one-at-a-time or all)"
        transport: "Message transport (sse, websocket, or auto)"
      notes:
        - "Settings are stored at ~/.pi/agent/settings.json (global) and .pi/settings.json (project)"
        - "Project settings override global settings via JSON merging"
        - "Skills are loaded from: ~/.pi/agent/skills/, ~/.agents/skills/, .pi/skills/, .agents/skills/"
        - "Custom skill paths can be added to the 'skills' array in settings.json"
        - "Use --no-skills to disable automatic skill discovery at startup"
        - "Use --skill <path> to explicitly load specific skills"
    cli_parameters:
      injected: []
    filesystem:
      touched:
        - "~/.pi/agent/settings.json (Global Pi configuration)"
        - ".pi/settings.json (Project-level Pi configuration)"
        - "~/.pi/agent/skills/ (Global skills directory)"
        - "~/.agents/skills/ (Alternative global skills directory)"
        - ".pi/skills/ (Project skills directory)"
        - ".agents/skills/ (Alternative project skills directory)"
